<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DapoerPintar - AI Kitchen Assistant</title>
    <!-- Tailwind CSS & FontAwesome Icons (Aman dari error React) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FFFBF0; 
            color: #1a1a1a;
        }

        /* Styling untuk konten resep Markdown-style */
        .recipe-content h2 { 
            font-size: 1.75rem; 
            font-weight: 800; 
            color: #9a3412; 
            margin-top: 1.5rem; 
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px dashed #ffedd5;
            padding-bottom: 0.5rem;
        }
        .recipe-content p { 
            margin-bottom: 0.75rem; 
            line-height: 1.7;
            color: #4b5563;
        }
        .recipe-content ul { 
            margin-bottom: 1.25rem; 
            padding-left: 1.25rem;
        }
        .recipe-content li { 
            list-style-type: disc;
            margin-bottom: 0.4rem;
        }
        .recipe-content blockquote {
            background: #fff7ed;
            border-left: 4px solid #fb923c;
            padding: 1rem;
            margin: 1.5rem 0;
            font-style: italic;
            border-radius: 0 1rem 1rem 0;
        }

        /* Animasi Loading */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #fb923c;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        const apiKey = ""; // API Key otomatis dari environment

        function App() {
            const [isStarted, setIsStarted] = useState(false);
            const [ingredients, setIngredients] = useState("");
            const [equipment, setEquipment] = useState("");
            const [recipe, setRecipe] = useState("");
            const [recipeImage, setRecipeImage] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [history, setHistory] = useState([]);
            const [showHistory, setShowHistory] = useState(false);

            const generateImage = async (prompt) => {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            instances: { prompt: `Cinematic food photography of ${prompt}, high-end restaurant style, warm lighting, wooden table background` }, 
                            parameters: { sampleCount: 1 } 
                        })
                    });
                    const data = await res.json();
                    return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                } catch (e) { return null; }
            };

            const handleGenerate = async () => {
                if (!ingredients.trim()) return;
                setIsLoading(true);
                setRecipe("");
                setRecipeImage(null);

                // Prompt yang sudah diperbarui dengan instruksi bendera dan asal negara
                const prompt = `Kamu adalah koki AI profesional. Buatlah resep kreatif menggunakan bahan: ${ingredients}. Alat masak: ${equipment || 'standar dapur'}.
Sertakan asal negara masakan tersebut dan emoji bendera negaranya di bagian judul.
Format output HARUS Markdown persis seperti ini:

## [Nama Resep] [Emoji Bendera]
> **Asal:** [Nama Negara] - [Cerita singkat tentang masakan]

**Bahan:**
- item

**Langkah:**
1. step

**Tips Koki:**
[tips]`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    const text = data.candidates[0].content.parts[0].text;
                    setRecipe(text);

                    const title = text.match(/## (.*)/)?.[1] || "Resep Masakan";
                    const img = await generateImage(title);
                    setRecipeImage(img);

                    setHistory(prev => [{ title, content: text, image: img, date: new Date().toLocaleTimeString() }, ...prev]);
                } catch (err) {
                    setRecipe("## Ups! Dapur Sedang Sibuk\nMohon maaf, koki AI kami sedang kewalahan. Silakan coba lagi sebentar ya.");
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#FFFBF0]">
                        <div className="max-w-md w-full bg-white rounded-[40px] shadow-2xl p-10 text-center border border-orange-100">
                            <div className="bg-orange-500 w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-orange-500/30 rotate-3">
                                <i className="fas fa-utensils text-white text-5xl"></i>
                            </div>
                            <h1 className="text-4xl font-black text-orange-900 mb-4 tracking-tighter">DapoerPintar</h1>
                            <p className="text-gray-500 font-medium mb-12">Sulap isi kulkasmu menjadi hidangan istimewa dalam sekejap.</p>
                            <button onClick={() => setIsStarted(true)} className="w-full bg-orange-500 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-orange-600 transition-all active:scale-95 text-lg">
                                MULAI MEMASAK
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white/80 backdrop-blur-md p-4 border-b sticky top-0 z-50 flex justify-between items-center px-6">
                        <button onClick={() => setShowHistory(true)} className="p-3 hover:bg-orange-50 rounded-xl text-orange-600 transition-all inline-flex items-center justify-center">
                            <i className="fas fa-clock-rotate-left text-xl"></i>
                        </button>
                        <h1 className="text-2xl font-black text-orange-900 tracking-tighter uppercase">Dapoer<span className="text-green-600">Pintar</span></h1>
                        <div className="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center text-orange-600 border border-orange-200">
                            <i className="fas fa-user"></i>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full">
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-white p-6 rounded-[32px] shadow-xl border border-orange-50">
                                <h3 className="font-bold text-gray-800 mb-6 flex items-center gap-2 text-lg">
                                    <i className="fas fa-carrot text-orange-500"></i> Persiapan Bahan
                                </h3>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-xs font-black text-gray-400 uppercase tracking-widest mb-2 block">Apa isi kulkasmu?</label>
                                        <textarea 
                                            className="w-full h-32 p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-orange-400 outline-none transition-all text-sm resize-none font-medium" 
                                            placeholder="Contoh: Telur, Sosis, Nasi..." 
                                            value={ingredients} 
                                            onChange={(e) => setIngredients(e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs font-black text-gray-400 uppercase tracking-widest mb-2 block">Alat yang ada?</label>
                                        <input 
                                            className="w-full p-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-green-400 outline-none transition-all text-sm font-medium" 
                                            placeholder="Contoh: Air Fryer, Wajan..." 
                                            value={equipment} 
                                            onChange={(e) => setEquipment(e.target.value)}
                                        />
                                    </div>
                                </div>
                                <button onClick={handleGenerate} disabled={isLoading || !ingredients} className="w-full mt-8 bg-orange-500 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-orange-600 disabled:opacity-50 transition-all active:scale-95 flex items-center justify-center gap-2">
                                    {isLoading ? <span className="loader" style={{width: 20, height: 20, borderWidth: 3}}></span> : <i className="fas fa-wand-magic-sparkles"></i>}
                                    {isLoading ? "MERACIK..." : "BUAT RESEP"}
                                </button>
                            </div>
                        </div>

                        <div className="lg:col-span-8">
                            <div className="bg-white rounded-[32px] shadow-xl border border-orange-50 min-h-[500px] overflow-hidden">
                                {isLoading ? (
                                    <div className="h-full flex flex-col items-center justify-center p-20 text-center">
                                        <span className="loader mb-6"></span>
                                        <h2 className="text-2xl font-black text-orange-900 mb-2 animate-pulse">Memasak dengan AI...</h2>
                                    </div>
                                ) : recipe ? (
                                    <div className="animate-in fade-in duration-700">
                                        {recipeImage && <img src={recipeImage} className="w-full h-72 object-cover" alt="Masakan" />}
                                        <div className="p-8 md:p-12 recipe-content">
                                            {recipe.split('\n').map((line, i) => {
                                                if(line.startsWith('##')) return <h2 key={i}><span>{line.replace('##', '')}</span></h2>;
                                                if(line.startsWith('>')) return <blockquote key={i}>{line.replace('>', '')}</blockquote>;
                                                if(line.startsWith('-')) return <li key={i}>{line.replace('-', '')}</li>;
                                                if(line.trim() === "") return <div key={i} className="h-2" />;
                                                return <p key={i}>{line.replace(/\*\*/g, '')}</p>;
                                            })}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center p-20 opacity-20 text-center">
                                        <i className="fas fa-bowl-food text-8xl mb-4 text-gray-400"></i>
                                        <p className="font-black text-xl uppercase tracking-widest text-gray-400 mt-4">Resep Akan Muncul Di Sini</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    {showHistory && (
                        <div className="fixed inset-0 z-[100] flex justify-end">
                            <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" onClick={() => setShowHistory(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full shadow-2xl p-8 overflow-y-auto animate-in slide-in-from-right duration-500">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black">Riwayat Resep</h2>
                                    <button onClick={() => setShowHistory(false)} className="p-2 hover:bg-gray-100 rounded-full transition-all inline-flex items-center justify-center">
                                        <i className="fas fa-times text-xl"></i>
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    {history.map((item, idx) => (
                                        <div key={idx} className="bg-orange-50 p-4 rounded-2xl border border-orange-100 cursor-pointer hover:bg-white transition-all shadow-sm" onClick={() => { setRecipe(item.content); setRecipeImage(item.image); setShowHistory(false); }}>
                                            <h4 className="font-bold text-orange-950">{item.title}</h4>
                                            <p className="text-[10px] text-gray-400 font-bold uppercase mt-1">{item.date}</p>
                                        </div>
                                    ))}
                                    {history.length === 0 && <p className="text-center text-gray-400 py-10">Belum ada riwayat.</p>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
