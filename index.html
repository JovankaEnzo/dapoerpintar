<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DapoerPintar AI - Standalone Pro Edition</title>
    
    <!-- Tailwind CSS (Desain Modern) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons (Dekorasi Dapur) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts (Typography Premium) -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFFBF0;
            color: #1a1a1a;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Dekorasi Background Dapur */
        .kitchen-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.3;
            pointer-events: none;
            background-color: #FFFBF0;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(249, 115, 22, 0.1) 1px, transparent 0),
                linear-gradient(rgba(249, 115, 22, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(249, 115, 22, 0.02) 1px, transparent 1px);
            background-size: 30px 30px, 120px 120px, 120px 120px;
        }

        /* Animasi Ikon Melayang */
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .recipe-content blockquote {
            background-color: #fff7ed;
            border-left: 6px solid #f97316;
            padding: 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            border-radius: 0 1.5rem 1.5rem 0;
            color: #7c2d12;
            line-height: 1.8;
        }

        /* Desain Langkah-Langkah Per Poin */
        .step-item {
            position: relative;
            padding-left: 4rem;
            margin-bottom: 2rem;
        }

        .step-number {
            position: absolute;
            left: 0;
            top: 0;
            width: 3rem;
            height: 3rem;
            background: #f97316;
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 8px 16px rgba(249, 115, 22, 0.3);
        }

        /* Loader Chef */
        .chef-loader {
            width: 70px;
            height: 70px;
            border: 8px solid #f97316;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & Babel Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 24, className = "", style = {} }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size, ...style }}></i>;
        };

        function App() {
            const [apiKey, setApiKey] = useState(() => localStorage.getItem("GEMINI_API_KEY") || "");
            const [isApiKeySaved, setIsApiKeySaved] = useState(!!apiKey);
            const [isStarted, setIsStarted] = useState(false);
            const [ingredients, setIngredients] = useState("");
            const [equipment, setEquipment] = useState("");
            const [recipe, setRecipe] = useState("");
            const [recipeImage, setRecipeImage] = useState(null);
            const [difficulty, setDifficulty] = useState("Sedang");
            const [isLoading, setIsLoading] = useState(false);
            const [loadingText, setLoadingText] = useState("");
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem("RECIPE_HISTORY");
                return saved ? JSON.parse(saved) : [];
            });
            const [showHistory, setShowHistory] = useState(false);

            // Perbarui Ikon Lucide setiap render
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            useEffect(() => {
                localStorage.setItem("RECIPE_HISTORY", JSON.stringify(history));
            }, [history]);

            const saveApiKey = (key) => {
                if (key.trim()) {
                    localStorage.setItem("GEMINI_API_KEY", key.trim());
                    setApiKey(key.trim());
                    setIsApiKeySaved(true);
                }
            };

            const clearApiKey = () => {
                localStorage.removeItem("GEMINI_API_KEY");
                setApiKey("");
                setIsApiKeySaved(false);
            };

            const handleGenerate = async (isRegenerate = false) => {
                if (!ingredients.trim()) return;
                setIsLoading(true);
                if (!isRegenerate) setRecipe("");
                setRecipeImage(null);
                setLoadingText("Menjelajahi sejarah kuliner...");

                const prompt = `Bahan: ${ingredients}. Alat: ${equipment || 'Standar Dapur'}.
Buatlah resep masakan yang UNIK dan EDUKATIF.

STRUKTUR JAWABAN (WAJIB FORMAT INI):
JUDUL: [Nama Makanan]
LEVEL: [Mudah/Sedang/Sulit]
ASAL-USUL: [Cerita detail penemu, asal negara/daerah, dan keasliannya]
BAHAN:
- [Item dengan ukuran]
LANGKAH:
1. [Langkah 1: Jelas]
2. [Langkah 2: Suhu/Waktu]
(Dst...)
TIPS:
- [Tips Rahasia]

INSTRUKSI: Jangan gunakan tanda bintang (**). Buat langkah-langkah per poin agar tidak padat.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const text = data.candidates[0].content.parts[0].text.replace(/\*/g, '');
                    setRecipe(text);

                    const titleMatch = text.match(/JUDUL:\s*(.*)/);
                    const title = titleMatch ? titleMatch[1].trim() : "Hidangan";
                    
                    const diffMatch = text.match(/LEVEL:\s*(Mudah|Sedang|Sulit)/i);
                    const level = diffMatch ? diffMatch[1] : "Sedang";
                    setDifficulty(level);

                    // Gambar yang disesuaikan secara dinamis
                    const cleanTitle = title.replace(/Hidangan|Masakan|Legendaris/gi, '').trim();
                    const searchTag = cleanTitle.split(' ')[0].replace(/[^a-zA-Z]/g, '');
                    const imgUrl = `https://loremflickr.com/1200/800/food,dish,${encodeURIComponent(searchTag)}/all`;
                    setRecipeImage(imgUrl);

                    setHistory(prev => [{
                        id: Date.now(), title, content: text, image: imgUrl, difficulty: level, createdAt: Date.now()
                    }, ...prev]);

                } catch (e) {
                    setRecipe("JUDUL: Server Sibuk\nASAL-USUL: Error Koneksi\nLANGKAH:\n1. Coba periksa API Key Anda.");
                } finally {
                    setIsLoading(false);
                }
            };

            const KitchenDecor = () => (
                <div className="kitchen-bg">
                    <Icon name="utensils" size={200} className="floating absolute top-[5%] left-[-2%] opacity-20" />
                    <Icon name="soup" size={150} className="floating absolute top-[40%] right-[-3%] opacity-20" />
                    <Icon name="chef-hat" size={280} className="floating absolute bottom-[-5%] left-[5%] opacity-20" />
                    <Icon name="flame" size={180} className="floating absolute top-[20%] right-[10%] opacity-20" />
                    <Icon name="coffee" size={120} className="floating absolute middle left-[20%] opacity-10" />
                </div>
            );

            const LevelBadge = ({ level }) => {
                const colors = { Mudah: "bg-green-500", Sedang: "bg-yellow-500", Sulit: "bg-red-500" };
                return <div className={`${colors[level] || "bg-gray-500"} text-white text-[10px] font-black px-4 py-2 rounded-full shadow-lg uppercase`}>Level: {level}</div>;
            };

            if (!isApiKeySaved) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-[40px] shadow-2xl p-10 text-center border border-orange-100 fade-in">
                            <Icon name="key" size={50} className="text-orange-500 mx-auto mb-6" />
                            <h1 className="text-2xl font-black text-orange-950 mb-2 tracking-tight">Login API Key</h1>
                            <p className="text-gray-400 mb-8 text-sm font-medium">Masukkan Gemini API Key Anda untuk mulai memasak.</p>
                            <input type="password" id="api-key" placeholder="Paste API Key di sini..." className="w-full p-5 bg-gray-50 border-2 border-transparent focus:border-orange-500 rounded-2xl outline-none mb-6 font-mono text-sm" />
                            <button onClick={() => saveApiKey(document.getElementById('api-key').value)} className="w-full bg-orange-500 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-orange-600 transition-all active:scale-95">Masuk Sekarang</button>
                        </div>
                    </div>
                );
            }

            if (!isStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
                        <KitchenDecor />
                        <div className="max-w-md w-full bg-white rounded-[40px] shadow-2xl p-10 text-center border border-orange-100 fade-in z-10">
                            <div className="relative mb-10 w-32 h-32 mx-auto bg-gradient-to-br from-orange-400 to-red-500 rounded-[35px] flex items-center justify-center shadow-2xl rotate-[-6deg]">
                                <Icon name="utensils" size={50} className="text-white" />
                            </div>
                            <h1 className="text-4xl font-black text-orange-950 mb-4 tracking-tighter">Dapoer<span className="text-green-600">Pintar</span></h1>
                            <p className="text-gray-500 mb-10 font-semibold px-4 leading-relaxed">Asisten masak cerdas dengan resep teliti & sejarah kuliner unik.</p>
                            <button onClick={() => setIsStarted(true)} className="w-full bg-orange-500 text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95">MULAI RACIK <Icon name="arrow-right" size={20} /></button>
                            <button onClick={clearApiKey} className="mt-8 text-xs font-black text-gray-400 uppercase tracking-widest hover:text-red-500 transition-colors">Ganti API Key</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col relative">
                    <KitchenDecor />
                    <header className="bg-white/80 backdrop-blur-lg border-b p-4 sticky top-0 z-50 flex justify-between items-center px-6 md:px-16 shadow-sm">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setShowHistory(true)} className="p-3 bg-orange-50 text-orange-500 rounded-2xl hover:bg-orange-100 transition-colors"><Icon name="history" /></button>
                            <div className="flex items-center gap-2 bg-green-50 px-3 py-1.5 rounded-full border border-green-100">
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_green]"></div>
                                <span className="text-[10px] font-black text-green-700 tracking-widest">CONNECTED</span>
                            </div>
                        </div>
                        <h1 className="text-2xl font-black text-orange-950 cursor-pointer" onClick={() => setIsStarted(false)}>Dapoer<span className="text-green-600">Pintar</span></h1>
                        <button onClick={clearApiKey} className="p-3 bg-gray-100 text-gray-400 rounded-2xl hover:text-red-500"><Icon name="key" size={20} /></button>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 md:p-12 grid grid-cols-1 lg:grid-cols-12 gap-10 w-full mb-20 z-10">
                        <div className="lg:col-span-4">
                            <div className="bg-white p-8 rounded-[40px] shadow-2xl border border-orange-50 lg:sticky lg:top-32">
                                <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Ramuan Bahan</h3>
                                <textarea className="w-full h-44 p-5 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-orange-500 outline-none transition-all text-sm font-semibold shadow-inner resize-none mb-6" placeholder="Bahan apa yang kamu punya?" value={ingredients} onChange={(e) => setIngredients(e.target.value)} />
                                <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mb-4">Peralatan</h3>
                                <input className="w-full p-5 bg-gray-50 rounded-2xl border-2 border-transparent focus:border-green-500 outline-none text-sm font-semibold shadow-inner mb-8" placeholder="Alat dapur yang tersedia..." value={equipment} onChange={(e) => setEquipment(e.target.value)} />
                                <button onClick={() => handleGenerate(false)} disabled={isLoading || !ingredients.trim()} className="w-full bg-orange-500 text-white font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 hover:bg-orange-600 active:scale-95 disabled:opacity-50">
                                    {isLoading ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="wand-2" />}
                                    {isLoading ? "MERAMU..." : "Racik Resep"}
                                </button>
                            </div>
                        </div>

                        <div className="lg:col-span-8">
                            {isLoading ? (
                                <div className="bg-white rounded-[50px] shadow-2xl h-[600px] flex flex-col items-center justify-center p-10 text-center">
                                    <div className="chef-loader mb-10"></div>
                                    <h2 className="text-2xl font-black text-orange-950 mb-4 animate-pulse">Menelusuri Warisan Kuliner...</h2>
                                    <p className="text-gray-400 italic">"{loadingText}"</p>
                                </div>
                            ) : recipe ? (
                                <div className="bg-white rounded-[50px] shadow-2xl overflow-hidden border border-orange-50 fade-in">
                                    <div className="relative h-[450px]">
                                        {recipeImage && <img src={recipeImage} className="w-full h-full object-cover" />}
                                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                                        <div className="absolute top-10 right-10"><LevelBadge level={difficulty} /></div>
                                        <div className="absolute bottom-10 left-10 right-10">
                                            <h2 className="text-3xl md:text-5xl font-black text-white drop-shadow-2xl mb-8">{recipe.match(/JUDUL:\s*(.*)/)?.[1]}</h2>
                                            <button onClick={() => handleGenerate(true)} className="bg-white text-orange-600 font-black px-6 py-3 rounded-2xl shadow-xl flex items-center gap-3 text-sm hover:bg-orange-50 transition-all"><Icon name="rotate-ccw" size={16} /> BERI RESEP YANG LAIN</button>
                                        </div>
                                    </div>
                                    <div className="p-8 md:p-16 space-y-12">
                                        {recipe.split('\n').map((line, idx) => {
                                            const l = line.trim();
                                            if (!l || l.startsWith('JUDUL:') || l.startsWith('LEVEL:')) return null;
                                            if (l.startsWith('ASAL-USUL:')) return (
                                                <div key={idx} className="bg-orange-50/50 p-8 rounded-[35px] border border-orange-100 flex gap-6 items-start">
                                                    <Icon name="globe" className="text-orange-900 mt-1 shrink-0" size={30} />
                                                    <div>
                                                        <h4 className="text-[10px] font-black text-orange-900 uppercase tracking-widest mb-2">History & Origin</h4>
                                                        <p className="text-gray-700 italic text-lg leading-relaxed">{l.replace('ASAL-USUL:', '')}</p>
                                                    </div>
                                                </div>
                                            );
                                            if (l.match(/^(BAHAN|LANGKAH|TIPS)/)) return <h4 key={idx} className="text-2xl font-black text-orange-950 pt-8 flex items-center gap-4"><span className="w-12 h-1.5 bg-orange-500 rounded-full"></span>{l.replace(':', '')}</h4>;
                                            if (l.startsWith('-')) return <div key={idx} className="bg-gray-50 p-5 rounded-2xl flex gap-4 items-start border border-gray-100"><Icon name="check-circle" className="text-orange-500 mt-1 shrink-0" size={20} /><span className="text-gray-700 font-semibold">{l.replace('-', '')}</span></div>;
                                            if (/^\d+\./.test(l)) {
                                                const num = l.match(/^\d+/)[0];
                                                return <div key={idx} className="step-item"><div className="step-number">{num}</div><p className="bg-white border-2 border-orange-50 p-6 rounded-3xl text-gray-700 font-medium text-lg leading-relaxed shadow-sm">{l.replace(/^\d+\.\s*/, '')}</p></div>;
                                            }
                                            return <p key={idx} className="text-gray-600 text-lg leading-relaxed">{l}</p>;
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="h-[600px] bg-white/50 border-4 border-dashed border-orange-100 rounded-[50px] flex flex-col items-center justify-center opacity-40">
                                    <Icon name="chef-hat" size={100} className="text-orange-200 mb-10" />
                                    <h3 className="text-3xl font-black text-orange-950 tracking-tighter">MEJA MASAK KOSONG</h3>
                                    <p className="font-bold text-gray-400 mt-4 px-10 text-center">Tuliskan bahanmu di samping untuk mulai menciptakan karya kuliner.</p>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Sidebar Riwayat (Sejarah) */}
                    {showHistory && (
                        <div className="fixed inset-0 z-[100] flex justify-end fade-in">
                            <div className="absolute inset-0 bg-orange-950/40 backdrop-blur-md" onClick={() => setShowHistory(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full shadow-2xl p-8 overflow-y-auto">
                                <div className="flex justify-between items-center mb-10 sticky top-0 bg-white pb-6 border-b">
                                    <h2 className="text-2xl font-black text-orange-950 flex items-center gap-3"><Icon name="scroll" className="text-orange-500" /> Galeri Resep</h2>
                                    <button onClick={() => setShowHistory(false)} className="p-3 hover:bg-gray-100 rounded-full"><Icon name="x" /></button>
                                </div>
                                <div className="space-y-6">
                                    {history.map((item, i) => (
                                        <div key={i} className="flex gap-4 p-4 rounded-3xl border-2 border-orange-50 hover:border-orange-500 transition-all cursor-pointer group" onClick={() => { setRecipe(item.content); setRecipeImage(item.image); setDifficulty(item.difficulty); setShowHistory(false); window.scrollTo(0,0); }}>
                                            <div className="w-20 h-20 rounded-2xl overflow-hidden shadow-md group-hover:scale-105 transition-transform"><img src={item.image} className="w-full h-full object-cover" /></div>
                                            <div className="flex-1 flex flex-col justify-center">
                                                <h4 className="font-black text-orange-950 truncate mb-1">{item.title}</h4>
                                                <div className="flex items-center gap-2"><div className={`w-2 h-2 rounded-full ${item.difficulty === 'Sulit' ? 'bg-red-500' : item.difficulty === 'Sedang' ? 'bg-yellow-500' : 'bg-green-500'}`}></div><span className="text-[10px] font-black text-gray-400">{new Date(item.createdAt).toLocaleDateString()}</span></div>
                                            </div>
                                        </div>
                                    ))}
                                    {history.length === 0 && <div className="text-center py-20 text-gray-400 italic">Belum ada riwayat resep...</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
